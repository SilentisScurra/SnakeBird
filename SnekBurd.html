<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snek Burd</title>
  <style>
    body {
      background-color: #222;
      color: #FFF;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    
    #game-container {
      position: relative;
      width: 512px;
      height: 512px;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    canvas {
      width: 100%;
      height: 100%;
      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-crisp-edges;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background-color: #111;
      display: block;
    }

    #menu {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #menu h1 {
      font-size: 36px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 4px 4px 0px #000;
    }

    #level-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .lvl-btn {
      background-color: #333;
      color: #FFF;
      border: 4px solid #555;
      padding: 10px 15px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      image-rendering: pixelated;
    }

    .lvl-btn:hover:not(:disabled) {
      background-color: #555;
      border-color: #0f0;
    }

    .lvl-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  
  <div id="game-container">
    <div id="menu">
      <h1>Snek Burd</h1>
      <div id="level-grid"></div>
    </div>
    <canvas id="game" width="128" height="128"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    ctx.imageSmoothingEnabled = false;

    const gridSize = 8;
    const tileCount = canvas.width / gridSize;

    // --- Asset Loading ---
    const bgImage = new Image(); bgImage.src = 'https://raw.githubusercontent.com/SilentisScurra/SnakeBird/main/bgimage.png';
    const snakeSprite = new Image(); snakeSprite.src = './assets/sprites/snake.png';
    const wallSprite = new Image(); wallSprite.src = 'https://raw.githubusercontent.com/SilentisScurra/SnakeBird/main/wall.png';
    const appleSprite = new Image(); appleSprite.src = 'https://raw.githubusercontent.com/SilentisScurra/SnakeBird/main/apple.png';
    const finishSprite = new Image(); finishSprite.src = 'https://raw.githubusercontent.com/SilentisScurra/SnakeBird/main/finish.png';
    const spikeSprite = new Image(); spikeSprite.src = 'https://raw.githubusercontent.com/SilentisScurra/SnakeBird/main/spike.png';

    // --- Game States ---
    const STATE_MENU = 0;
    const STATE_PLAY = 1;
    const STATE_FINISH = 2;
    const STATE_TRANSITION = 3;
    let gameState = STATE_MENU;

    // --- Level Data ---
    const LEVELS = [
      {
        snake: [{x:5,y:7},{x:4,y:7}],
        food: [{x:7,y:10},{x:13,y:7},{x:7,y:5}],
        finish: {x:9,y:4},
        walls: [{x:6,y:10},{x:5,y:10},{x:4,y:8},{x:4,y:9},{x:5,y:8},{x:5,y:9},{x:6,y:9},{x:7,y:9},{x:8,y:6},{x:8,y:5},{x:9,y:5},{x:9,y:6},{x:6,y:11},{x:6,y:12},{x:7,y:12},{x:8,y:12},{x:9,y:12},{x:9,y:11},{x:9,y:10},{x:10,y:9},{x:11,y:9},{x:11,y:10},{x:10,y:10},{x:10,y:11},{x:12,y:9},{x:5,y:12},{x:5,y:11},{x:4,y:11},{x:4,y:10},{x:4,y:12},{x:4,y:13},{x:4,y:15},{x:4,y:14},{x:5,y:14},{x:5,y:13},{x:6,y:13},{x:12,y:10},{x:12,y:11},{x:12,y:12},{x:12,y:13},{x:12,y:15},{x:12,y:14},{x:11,y:14},{x:10,y:13},{x:10,y:12},{x:11,y:12},{x:11,y:13},{x:11,y:11},{x:5,y:15},{x:11,y:15},{x:7,y:13},{x:8,y:13},{x:9,y:13},{x:10,y:14},{x:6,y:14}],
        spikes: []
      },
      {
        snake: [{x:2,y:9},{x:1,y:9},{x:0,y:9}],
        food: [{x:15,y:9},{x:10,y:8}],
        finish: {x:12,y:7},
        walls: [{x:0,y:11},{x:1,y:11},{x:2,y:11},{x:3,y:11},{x:4,y:11},{x:5,y:11},{x:6,y:11},{x:1,y:12},{x:2,y:12},{x:3,y:12},{x:2,y:13},{x:2,y:15},{x:2,y:14},{x:0,y:10},{x:1,y:10},{x:2,y:10},{x:3,y:10},{x:4,y:10},{x:7,y:11},{x:8,y:11},{x:9,y:11},{x:10,y:11},{x:11,y:11},{x:12,y:11},{x:13,y:11},{x:14,y:11},{x:15,y:11},{x:6,y:9},{x:6,y:8},{x:6,y:7},{x:8,y:10},{x:9,y:10},{x:8,y:9},{x:12,y:8},{x:12,y:9},{x:13,y:9},{x:15,y:10},{x:7,y:7},{x:8,y:6},{x:7,y:6},{x:6,y:6},{x:5,y:6},{x:5,y:5},{x:6,y:5},{x:14,y:12},{x:13,y:12},{x:12,y:12},{x:13,y:13},{x:13,y:14},{x:13,y:15},{x:4,y:12},{x:11,y:12},{x:12,y:13},{x:12,y:14},{x:12,y:15},{x:3,y:13},{x:3,y:14},{x:3,y:15}],
        spikes: []
      },
      {
        snake: [{x:7,y:8},{x:8,y:8}],
        food: [{x:5,y:6},{x:9,y:6}],
        finish: {x:8,y:3},
        walls: [{x:8,y:9},{x:7,y:9},{x:6,y:9},{x:6,y:10},{x:7,y:10},{x:8,y:10},{x:9,y:10},{x:9,y:9},{x:6,y:11},{x:7,y:11},{x:6,y:8},{x:8,y:6},{x:10,y:6},{x:5,y:5}],
        spikes: []
      },
      {
        snake: [{x:7,y:10},{x:6,y:10},{x:6,y:11}],
        food: [{x:8,y:7},{x:5,y:7}],
        finish: {x:8,y:5},
        walls: [{x:7,y:11},{x:9,y:9},{x:6,y:9},{x:6,y:6},{x:9,y:7}],
        spikes: [{x:8,y:11},{x:8,y:10},{x:9,y:10},{x:5,y:9}]
      },
      {
        snake: [{x:7,y:9},{x:6,y:9},{x:6,y:10},{x:6,y:11},{x:6,y:12},{x:7,y:12}],
        food: [{x:5,y:6},{x:9,y:6},{x:7,y:11}],
        finish: {x:7,y:5},
        walls: [{x:7,y:10},{x:5,y:11},{x:4,y:11},{x:4,y:12},{x:4,y:13},{x:4,y:14},{x:4,y:15},{x:3,y:11},{x:3,y:12},{x:3,y:13},{x:3,y:14},{x:3,y:15},{x:11,y:11},{x:11,y:12},{x:10,y:12},{x:10,y:13},{x:11,y:13},{x:11,y:14},{x:11,y:15},{x:10,y:15},{x:10,y:14},{x:7,y:6}],
        spikes: [{x:10,y:11},{x:10,y:10},{x:11,y:10},{x:5,y:10},{x:4,y:10},{x:3,y:10},{x:9,y:11}]
      }
    ];

    // --- Game Variables ---
    let currentLevelIdx = 0;
    let maxUnlockedLevel = 0;
    let walls = [];
    let spikes = [];
    let snake = [];
    let prevSnake = []; 
    let food = [];
    let finish = {x: -1, y: -1};
    let dx = 0, dy = 0, nextDx = 0, nextDy = 0;
    let started = false;
    let gameFrame = 0;
    let fadeAlpha = 0;
    let fadeDir = 0; 
    let justWon = false;

    // --- Lerping Variables ---
    let lerpProgress = 1;
    const LERP_SPEED = .2; 

    // --- Initialization & Local Storage ---
    function initMenu() {
      try {
        maxUnlockedLevel = parseInt(localStorage.getItem('snekMaxLevel')) || 0;
      } catch (e) {
        maxUnlockedLevel = 0;
      }

      const grid = document.getElementById('level-grid');
      grid.innerHTML = ''; 

      for (let i = 0; i < LEVELS.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'lvl-btn';
        btn.innerText = `Level ${i + 1}`;
        if (i > maxUnlockedLevel) {
          btn.disabled = true;
        } else {
          btn.onclick = () => startTransitionToLevel(i);
        }
        grid.appendChild(btn);
      }
      
      document.getElementById('menu').style.display = 'flex';
      gameState = STATE_MENU;
    }

    function startTransitionToLevel(idx) {
      currentLevelIdx = idx;
      justWon = false; 
      document.getElementById('menu').style.display = 'none';
      gameState = STATE_TRANSITION;
      fadeAlpha = 0;
      fadeDir = 1; 
    }

    function loadLevel(idx) {
      let lvl = LEVELS[idx];
      snake = JSON.parse(JSON.stringify(lvl.snake));
      prevSnake = JSON.parse(JSON.stringify(lvl.snake)); 
      food = JSON.parse(JSON.stringify(lvl.food));
      walls = JSON.parse(JSON.stringify(lvl.walls));
      spikes = lvl.spikes ? JSON.parse(JSON.stringify(lvl.spikes)) : [];
      finish = { ...lvl.finish };
      
      lerpProgress = 1;
      dx = dy = nextDx = nextDy = 0;
      started = false;
    }

    function saveProgress(levelIdx) {
      if (levelIdx > maxUnlockedLevel) {
        maxUnlockedLevel = levelIdx;
        try { localStorage.setItem('snekMaxLevel', maxUnlockedLevel); } catch (e) {}
      }
    }

    // --- Core Helpers ---
    function lerp(start, end, t) {
      return start + (end - start) * t;
    }

    function drawRotatedImage(img, sx, sy, sw, sh, destX, destY, dw, dh, angle) {
      ctx.save();
      ctx.translate(Math.floor(destX + dw / 2), Math.floor(destY + dh / 2));
      ctx.rotate(angle);
      ctx.drawImage(img, sx, sy, sw, sh, Math.floor(-dw / 2), Math.floor(-dh / 2), dw, dh);
      ctx.restore();
    }

    function drawRect(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x * gridSize), Math.round(y * gridSize), gridSize, gridSize);
    }

    function isWall(x, y) {
      for (let wall of walls) { if (wall.x === x && wall.y === y) return true; }
      return false;
    }

    function isSpike(x, y) {
      for (let spike of spikes) { if (spike.x === x && spike.y === y) return true; }
      return false;
    }

    function checkWallBeneath() {
      for (let part of snake) {
        for (let wall of walls) { if (part.x === wall.x && part.y + 1 === wall.y) return true; }
      }
      return false;
    }

    function gameOver() {
      justWon = false;
      gameState = STATE_TRANSITION;
      fadeDir = 1; 
    }

    function hasValidMoves() {
      const dirs = [[0,-1], [0,1], [-1,0], [1,0]];
      for (let [dirX, dirY] of dirs) {
        let tx = snake[0].x + dirX;
        let ty = snake[0].y + dirY;
        
        if (tx < 0 || ty < 0 || tx >= tileCount || ty >= tileCount) continue;
        if (isWall(tx, ty)) continue;

        let hitBody = false;
        for (let i = 1; i < snake.length; i++) {
          if (snake[i].x === tx && snake[i].y === ty) { hitBody = true; break; }
        }
        if (hitBody) continue;
        return true; 
      }
      return false;
    }

    // --- Separated Logic & Render Loops ---
    function gameLoop() {
      requestAnimationFrame(gameLoop);
      gameFrame++;

      // 1. Logic Processing
      if (gameState === STATE_TRANSITION) {
        fadeAlpha += (0.02 * fadeDir); 
        
        if (fadeAlpha >= 1 && fadeDir === 1) {
          fadeAlpha = 1;
          if (justWon) { 
            justWon = false;
            let nextLevel = currentLevelIdx + 1;
            if (nextLevel >= LEVELS.length) {
              saveProgress(nextLevel);
              initMenu();
              fadeDir = -1; 
            } else {
              saveProgress(nextLevel);
              currentLevelIdx = nextLevel;
              loadLevel(currentLevelIdx);
              fadeDir = -1; 
            }
          } else {
            loadLevel(currentLevelIdx);
            fadeDir = -1;
          }
        } 
        else if (fadeAlpha <= 0 && fadeDir === -1) {
          fadeAlpha = 0;
          if (gameState !== STATE_MENU) gameState = STATE_PLAY;
        }
      }
      else if (gameState === STATE_PLAY || gameState === STATE_FINISH) {
        if (lerpProgress < 1) {
          lerpProgress += LERP_SPEED;
          if (lerpProgress >= 1) lerpProgress = 1;
        }

        if (lerpProgress === 1) {
          let moved = false;
          let oldSnakeStr = JSON.stringify(snake); 

          if (gameState === STATE_PLAY) {
            if (!checkWallBeneath()) {
              started = false;
              for (let part of snake) part.y += 1;
              moved = true;
              if (snake[0].y >= tileCount) { gameOver(); }
            } else {
              if (!hasValidMoves()) { gameOver(); }

              if (started) {
                dx = nextDx; dy = nextDy;
                const head = { x: snake[0].x + dx, y: snake[0].y + dy };
              
                if (head.x < 0 || head.y < 0 || head.x >= tileCount || head.y >= tileCount) { gameOver(); }
                else {
                  let collision = false;
                  for (let part of snake) { if (part.x === head.x && part.y === head.y) { collision = true; break; } }
                  
                  if (collision) { gameOver(); }
                  else {
                    snake.unshift(head);

                    let ate = false;
                    for (let i = 0; i < food.length; i++) {
                      if (food[i].x === head.x && food[i].y === head.y) {
                        food.splice(i, 1); ate = true; break;
                      }
                    }
                    if (!ate) snake.pop();

                    if (food.length === 0 && head.x === finish.x && head.y === finish.y) {
                      gameState = STATE_FINISH;
                    }
                    moved = true;
                  }
                }
              }
            }
            started = false; 

            if (gameState === STATE_PLAY) {
              for (let part of snake) {
                if (isSpike(part.x, part.y)) { gameOver(); break; }
              }
            }
          } 
          else if (gameState === STATE_FINISH) {
            if (snake.length > 0) {
              for (let i = snake.length - 1; i > 0; i--) {
                snake[i].x = snake[i - 1].x; snake[i].y = snake[i - 1].y;
              }
              snake.shift();
              moved = true;
            } else {
              justWon = true; 
              gameState = STATE_TRANSITION;
              fadeDir = 1; 
            }
          }

          if (moved && gameState !== STATE_TRANSITION) {
            prevSnake = JSON.parse(oldSnakeStr);
            lerpProgress = 0;
          }
        }
      }

      // 2. Rendering Processing
      render();
    }

    function render() {
      if (gameState === STATE_MENU && fadeAlpha <= 0) return;

      if (bgImage.complete && bgImage.naturalHeight !== 0) ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
      else { ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height); }

      if (food.length === 0 && finish.x !== -1) {
        if (finishSprite.complete && finishSprite.naturalWidth !== 0) {
          let animFrame = Math.floor(gameFrame / 15) % 3; 
          ctx.drawImage(finishSprite, animFrame * 8, 0, 8, 8, Math.floor(finish.x * gridSize), Math.floor(finish.y * gridSize), gridSize, gridSize);
        } else drawRect(finish.x, finish.y, '#ffff00');
      }

      for (let spike of spikes) {
        if (spikeSprite.complete && spikeSprite.naturalWidth !== 0) {
          ctx.drawImage(spikeSprite, 0, 0, 8, 8, Math.floor(spike.x * gridSize), Math.floor(spike.y * gridSize), gridSize, gridSize);
        } else drawRect(spike.x, spike.y, '#aaa');
      }

      for (let fruit of food) {
        if (appleSprite.complete && appleSprite.naturalWidth !== 0) {
          ctx.drawImage(appleSprite, 0, 0, 8, 8, Math.floor(fruit.x * gridSize), Math.floor(fruit.y * gridSize), gridSize, gridSize);
        } else drawRect(fruit.x, fruit.y, '#f00');
      }

      for (let wall of walls) {
        if (wallSprite.complete && wallSprite.naturalWidth !== 0) {
          ctx.drawImage(wallSprite, 0, 0, 8, 8, Math.floor(wall.x * gridSize), Math.floor(wall.y * gridSize), gridSize, gridSize);
        } else drawRect(wall.x, wall.y, '#f0f');
      }

      let smoothT = lerpProgress * lerpProgress * (3 - 2 * lerpProgress);

      for (let i = 0; i < snake.length; i++) {
        let part = snake[i];
        let prevPart = prevSnake[i] || part; 

        let currentX = lerp(prevPart.x, part.x, 1);
        let currentY = lerp(prevPart.y, part.y, 1);

        let destX = Math.round(currentX * gridSize);
        let destY = Math.round(currentY * gridSize);

        if (snakeSprite.complete && snakeSprite.naturalWidth !== 0) {
          let sx = 0;
          let angle = 0;

          if (i === 0) { // Head
            sx = 0;
            if (snake.length > 1) {
              let diffX = snake[0].x - snake[1].x; 
              let diffY = snake[0].y - snake[1].y;
              if (diffX === 1) angle = Math.PI; 
              else if (diffX === -1) angle = 0; 
              else if (diffY === -1) angle = Math.PI / 2; 
              else if (diffY === 1) angle = -Math.PI / 2;
            }
          } 
          else if (i === snake.length - 1) { // Tail
            sx = 16;
            if (snake.length > 1) {
              let diffX = snake[i - 1].x - part.x; 
              let diffY = snake[i - 1].y - part.y;
              if (diffX === 1) angle = Math.PI; 
              else if (diffX === -1) angle = 0; 
              else if (diffY === -1) angle = Math.PI / 2; 
              else if (diffY === 1) angle = -Math.PI / 2;
            }
          } 
          else { // Body Segments (Straight or Bends)
            let pNode = snake[i - 1]; // Towards Head
            let nNode = snake[i + 1]; // Towards Tail

            // Determine directional vectors from current segment to neighbors
            let dx1 = pNode.x - part.x; let dy1 = pNode.y - part.y;
            let dx2 = nNode.x - part.x; let dy2 = nNode.y - part.y;

            // Failsafe for newly eaten segments occupying same space
            if ((dx1 === 0 && dy1 === 0) || (dx2 === 0 && dy2 === 0) || (dx1 === -dx2 && dy1 === -dy2)) {
              sx = 8; // Straight
              if (dy1 !== 0 || dy2 !== 0) angle = Math.PI / 2; // Vertical orientation
              else angle = 0; // Horizontal orientation
            } else {
              sx = 24; // Bend
              let sumX = dx1 + dx2;
              let sumY = dy1 + dy2;

              if (sumX === -1 && sumY === 1) angle = 0; // Connecting Left & Down
              else if (sumX === -1 && sumY === -1) angle = Math.PI / 2; // Connecting Left & Up
              else if (sumX === 1 && sumY === -1) angle = Math.PI; // Connecting Right & Up
              else if (sumX === 1 && sumY === 1) angle = -Math.PI / 2; // Connecting Right & Down
            }
          }

          drawRotatedImage(snakeSprite, sx, 0, 8, 8, destX, destY, gridSize, gridSize, angle);
        } else {
          drawRect(currentX, currentY, '#0f0');
        }
      }

      if (fadeAlpha > 0) {
        ctx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    // --- Inputs ---
    document.addEventListener('keydown', (e) => {
      if (gameState !== STATE_PLAY) return; 

      let intendedDx = 0;
      let intendedDy = 0;

      switch (e.key) {
        case 'ArrowLeft': intendedDx = -1; break;
        case 'ArrowRight': intendedDx = 1; break;
        case 'ArrowUp': intendedDy = -1; break;
        case 'ArrowDown': intendedDy = 1; break;
        default: return; 
      }

      const targetX = snake[0].x + intendedDx;
      const targetY = snake[0].y + intendedDy;

      if (snake.length > 1 && targetX === snake[1].x && targetY === snake[1].y) return; 
      if (isWall(targetX, targetY)) return; 

      nextDx = intendedDx;
      nextDy = intendedDy;
      started = true;
    });

    initMenu();
    gameLoop();
  </script>
</body>
</html>
